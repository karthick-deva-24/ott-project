<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - 404 Page Not Found</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-404 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: radial-gradient(ellipse at center top, rgba(94, 232, 82, 0.07) 0%, transparent 60%),
                var(--bg-main);
            position: relative;
            overflow: hidden;
        }

        /* Ambient glow blobs */
        .page-404::before,
        .page-404::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
        }

        .page-404::before {
            width: 400px;
            height: 400px;
            background: rgba(94, 232, 82, 0.08);
            top: -100px;
            left: -100px;
        }

        .page-404::after {
            width: 300px;
            height: 300px;
            background: rgba(94, 232, 82, 0.05);
            bottom: -80px;
            right: -80px;
        }

        .error-404-inner {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            animation: fadeSlideUp 0.7s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-giant-code {
            font-size: clamp(100px, 22vw, 200px);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent) 0%, #a8ff78 50%, var(--accent) 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            letter-spacing: -6px;
            margin-bottom: 0;
            text-shadow: none;
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .error-film-icon {
            font-size: 52px;
            color: var(--accent);
            margin-bottom: 24px;
            display: inline-block;
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .error-heading {
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .error-sub {
            font-size: clamp(14px, 3vw, 17px);
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 440px;
            margin: 0 auto 40px;
        }

        .error-actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-home-btn {
            background: var(--accent);
            color: #000;
            padding: 14px 36px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-family: var(--font-family);
            box-shadow: 0 4px 20px rgba(94, 232, 82, 0.25);
        }

        .error-home-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(94, 232, 82, 0.4);
            color: #000;
        }

        .error-back-btn {
            background: transparent;
            color: var(--text-secondary);
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-family: var(--font-family);
        }

        .error-back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            transform: translateY(-4px);
        }

        /* Navbar override for 404 - always scrolled */
        .navbar {
            background-color: var(--bg-navbar) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 5%;
        }

        @media (max-width: 480px) {
            .error-giant-code {
                letter-spacing: -2px;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->


    <!-- 404 Content -->
    <main class="page-404">
        <div class="error-404-inner">
            <div class="error-giant-code">404</div>
            <i class="ri-film-line error-film-icon"></i>
            <h1 class="error-heading">Page Not Found</h1>
            <p class="error-sub">
                Looks like this scene got cut from the final edit. The page you're looking for doesn't exist, was
                removed, or the link might be broken.
            </p>
            <div class="error-actions">
                <a href="index.html" class="error-home-btn">
                    <i class="ri-home-4-line"></i> Back to Home
                </a>
                <button onclick="history.back()" class="error-back-btn">
                    <i class="ri-arrow-left-line"></i> Go Back
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
